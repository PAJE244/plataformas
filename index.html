<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVISO - 100% PLATAFORMAS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
  background:linear-gradient(135deg,#0a0a0a,#1a0000);
  color:#fff;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.container{
  text-align:center;
  width:100%;
  max-width:500px;
  animation:fadeUp 0.8s ease;
}

.logo{
  font-size:36px;
  font-weight:800;
  letter-spacing:3px;
  margin-bottom:8px;
  background:linear-gradient(135deg,#ff4d4d,#ff1a1a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  color:#ff4d4d;
  font-size:13px;
  opacity:0.7;
  margin-bottom:40px;
  letter-spacing:1px;
}

.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,0,0,0.15);
  border-radius:24px;
  padding:40px 30px;
  backdrop-filter:blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card h2{
  font-size:22px;
  margin-bottom:15px;
  color: #fff;
}

.card p{
  font-size:15px;
  line-height:1.6;
  opacity:0.8;
  margin-bottom:30px;
}

.new-site-btn{
  display: inline-block;
  width:100%;
  padding:16px;
  background:linear-gradient(135deg,#ff4d4d,#cc0000);
  border:none;
  border-radius:12px;
  color:#fff;
  font-size:16px;
  font-weight:700;
  text-decoration: none;
  cursor:pointer;
  transition:0.3s;
  letter-spacing:1px;
}

.new-site-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 25px rgba(255,0,0,0.45);
}

.new-site-btn:active{
  transform:scale(0.98);
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

footer{
  margin-top: 40px;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">100% PLATAFORMAS</div>
  <div class="subtitle">feito por Pajé 01</div>

  <div class="card">
    <h2>Atenção!</h2>
    <p>Os scripts não estão mais disponíveis neste endereço. Para continuar acessando o conteúdo atualizado, visite o nosso novo site oficial:</p>

    <a href="https://plataformas111.vercel.app/" class="new-site-btn">ACESSAR NOVO SITE</a>
  </div>

  <footer>
    © 100% Plataformas - Todos os direitos reservados
  </footer>
</div>

</body>
</html>
